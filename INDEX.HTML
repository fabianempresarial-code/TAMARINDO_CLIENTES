<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos PRO Tamarindo</title>

<style>
:root{
 --bg:#0f172a;
 --card:#1e293b;
 --accent:#22c55e;
 --accent2:#06b6d4;
 --text:#f8fafc;
 --soft:#334155;
}
body{margin:0;font-family:system-ui;background:linear-gradient(180deg,#0f172a,#020617);color:var(--text);min-height:100vh;}

header{background:linear-gradient(135deg,var(--accent),var(--accent2));padding:14px;text-align:center;font-weight:bold;font-size:1.2rem; display: flex; justify-content: center; align-items: center;}
.container{padding:12px;max-width:500px;margin:auto;}
.card{background:var(--card);padding:14px;border-radius:16px;margin-bottom:12px;box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.btn{padding:12px;border:none;border-radius:12px;background:var(--soft);color:white;cursor:pointer;font-weight:bold;transition:0.2s;}
.btn.active{background:var(--accent);color:#022c22;}
.btn-domi{background: #7c3aed; width: 100%; margin-bottom: 10px;}
.btn-domi.active{background: #a78bfa; border: 2px solid white;}

.actions{display:flex;justify-content:center;align-items:center;gap:20px;}
#count{font-size:1.5rem;font-weight:bold;}
select, .input-domi, .input-obs{width:100%;padding:12px;border-radius:12px;border:none;background:#020617;color:white;margin-bottom:8px;font-size:14px; box-sizing: border-box; appearance: none;}
.input-obs{border: 1px solid var(--soft); font-style: italic;}

.cat-label {font-size: 10px; color: var(--accent2); margin-bottom: 2px; margin-left: 5px; font-weight: bold; text-transform: uppercase;}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px; padding: 5px 0;}
.chip{padding:8px 12px;border-radius:20px;background:#334155;cursor:pointer;font-size:12px;}
.chip.active{background:var(--accent);color:#022c22;}
.main-actions{display:flex;gap:10px;margin-top:10px;}
.ticket-btn{background:var(--accent2);flex:1;}
.wa-btn{background:var(--accent);flex:1;}
.hist-item{background:#020617;padding:10px;border-radius:10px;margin-bottom:6px;font-size:13px;}
.del-btn{background:#ef4444;border:none;color:white;padding:4px 8px;border-radius:6px;margin-top:5px;cursor:pointer;}
label{display:block;margin-bottom:4px;font-size:11px;color:var(--accent2);text-transform:uppercase;font-weight:bold;}
#printFrame { display: none; }
</style>
</head>

<body>

<div id="app-content">
    <header>
        <span>🍽️ TAMARINDO</span>
    </header>

    <div class="container">
        <div class="card">
            <label>Día y Categoría</label>
            <div style="display:flex; gap:10px;">
                <select id="dia"></select>
                <select id="tipoMenu">
                    <option value="corriente">🍽 Corriente</option>
                    <option value="especial">⭐ Especial</option>
                </select>
            </div>
        </div>

        <div class="card">
            <button id="btn-domicilio" class="btn btn-domi" onclick="toggleDomicilio()">🛵 ES DOMICILIO</button>
            
            <div id="section-domicilio" style="display:none; border-top: 1px solid var(--soft); padding-top:10px;">
                <input type="text" id="dom-nombre" class="input-domi" placeholder="Nombre Cliente">
                <input type="text" id="dom-tel" class="input-domi" placeholder="Teléfono">
                <input type="text" id="dom-dir" class="input-domi" placeholder="Dirección">
                <input type="text" id="dom-obs-general" class="input-domi" placeholder="Observaciones generales">
            </div>

            <div id="section-mesas">
                <label>Seleccionar Mesa</label>
                <div class="grid" id="mesas"></div>
            </div>
        </div>

        <div class="card">
            <div class="actions">
                <button class="btn" onclick="cambiar(-1)">➖</button>
                <span id="count">1</span>
                <button class="btn" onclick="cambiar(1)">➕</button>
            </div>
        </div>

        <div id="comensales"></div>

        <div class="main-actions">
            <button class="btn ticket-btn" onclick="imprimir()">🧾 Ticket</button>
            <button class="btn wa-btn" onclick="wa()">📲 WhatsApp</button>
        </div>
        <button class="btn" style="width:100%; margin-top:10px; background:#f59e0b;" onclick="nuevoPedido()">🔄 Nuevo Pedido</button>

        <div class="card" style="margin-top:20px;">
            <h4>Historial Reciente</h4>
            <div id="historial"></div>
        </div>
    </div>
</div>

<iframe id="printFrame"></iframe>

<script>
const NUMERO_WHATSAPP = "573143996019"; 
const CANTIDAD_MESAS = 12; 
const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vS29H3hxA9X8VcqQqGZlT4duXOIT3xAdIhExEIut9frN0i78naYSj6gnWFkWliWwKNLT5tGNlaYh16j/pub?output=csv";

let data=[], headers=[], colEspecial=-1, total=1;
let isDomicilio = false;

window.onload = loadData;

function toggleDomicilio(){
    isDomicilio = !isDomicilio;
    document.getElementById("btn-domicilio").classList.toggle("active", isDomicilio);
    document.getElementById("section-domicilio").style.display = isDomicilio ? "block" : "none";
    document.getElementById("section-mesas").style.display = isDomicilio ? "none" : "block";
}

function loadData(){
    fetch(URL).then(r=>r.text()).then(t=>{
        let raw = parse(t);
        headers = raw[0].map(h=>h.toLowerCase().trim());
        colEspecial = headers.indexOf("especiales");
        data = raw.slice(1).map(r=>r.map(limpiar));
        init();
    });
}

function limpiar(txt){
    if(!txt) return "";
    let t=document.createElement("textarea");
    t.innerHTML=txt;
    return t.value.replace(/&[a-zA-Z0-9#]+;/g, "").trim();
}

function parse(t){
    let r=[],row=[],c='',q=false;
    for(let ch of t){
        if(ch=='"') q=!q;
        else if(ch==','&&!q){row.push(c);c=''}
        else if(ch=='\n'&&!q){row.push(c);r.push(row);row=[];c=''}
        else c+=ch;
    }
    row.push(c);r.push(row);
    return r;
}

function init(){
    generarDias();
    autoDia();
    crearMesas();
    render();
    cargarHistorial();
}

function generarDias(){
    let d=[...new Set(data.map(r=>r[0].toUpperCase()))];
    document.getElementById("dia").innerHTML=d.map(x=>`<option value="${x}">${x}</option>`).join("");
}

function autoDia(){
    let h=["DOMINGO","LUNES","MARTES","MIERCOLES","JUEVES","VIERNES","SABADO"][new Date().getDay()];
    let selectDia = document.getElementById("dia");
    if([...selectDia.options].some(o => o.value === h)) selectDia.value = h;
}

function get(colIndex){
    const modo = document.getElementById("tipoMenu").value;
    const diaActual = document.getElementById("dia").value;
    return [...new Set(
        data.filter(r => r[0].toUpperCase() === diaActual)
        .flatMap(r => {
            if (modo === "especial" && colIndex !== 5) {
                return (colIndex === colEspecial) ? (r[colEspecial] || "").split("-").map(limpiar).filter(Boolean) : [];
            }
            return (r[colIndex] || "").split("-").map(limpiar).filter(Boolean);
        })
    )];
}

function crearMesas(){
    const contenedor = document.getElementById("mesas");
    contenedor.innerHTML = "";
    for(let i=1; i<=CANTIDAD_MESAS; i++){
        let b=document.createElement("button");
        b.className="btn"; b.textContent=i;
        b.onclick=()=>{
            document.querySelectorAll("#mesas .btn").forEach(x=>x.classList.remove("active"));
            b.classList.add("active");
        };
        contenedor.appendChild(b);
    }
}

function cambiar(n){
    total = Math.max(1, total + n);
    document.getElementById("count").textContent = total;
    render();
}

function render() {
    const cont = document.getElementById("comensales");
    const actuales = [];
    document.querySelectorAll(".comensal-card").forEach(card => {
        actuales.push({
            e: card.querySelector(".e")?.value,
            p: card.querySelector(".p")?.value,
            pr: card.querySelector(".pr")?.value,
            b: card.querySelector(".b")?.value,
            obs: card.querySelector(".obs")?.value,
            chips: [...card.querySelectorAll(".chip.active")].map(c => c.textContent)
        });
    });

    cont.innerHTML = "";
    for (let i = 1; i <= total; i++) {
        cont.innerHTML += `
        <div class="card comensal-card">
            <div style="display:flex; align-items:center; gap:5px; margin-bottom:10px;">
                <span>👤</span> <b>Comensal ${i}</b>
            </div>
            
            <div class="group-e">
                <div class="cat-label">Sopa</div>
                <select class="e"></select>
            </div>

            <div class="group-p">
                <div class="cat-label">Plato Principal</div>
                <select class="p"></select>
            </div>

            <div class="group-pr">
                <div class="cat-label">Proteína</div>
                <select class="pr"></select>
            </div>

            <div class="group-a">
                <div class="cat-label">Acompañamientos</div>
                <div class="chips a"></div>
            </div>

            <div class="group-b">
                <div class="cat-label">Bebida</div>
                <select class="b"></select>
            </div>

            <div class="group-obs">
                <div class="cat-label">Observaciones</div>
                <input type="text" class="input-obs obs" placeholder="Ej: Sin cebolla, poca sal...">
            </div>
        </div>`;
    }
    
    llenarSelects();

    document.querySelectorAll(".comensal-card").forEach((card, i) => {
        if (actuales[i]) {
            if (card.querySelector(".e")) card.querySelector(".e").value = actuales[i].e;
            if (card.querySelector(".p")) card.querySelector(".p").value = actuales[i].p;
            if (card.querySelector(".pr")) card.querySelector(".pr").value = actuales[i].pr;
            if (card.querySelector(".b")) card.querySelector(".b").value = actuales[i].b;
            if (card.querySelector(".obs")) card.querySelector(".obs").value = actuales[i].obs || "";
            card.querySelectorAll(".chip").forEach(chip => {
                if (actuales[i].chips.includes(chip.textContent)) chip.classList.add("active");
            });
        }
    });
}

function llenarSelects(){
    const modo = document.getElementById("tipoMenu").value;
    document.querySelectorAll(".comensal-card").forEach(card => {
        const sSopa = card.querySelector(".e"), sPlato = card.querySelector(".p"),
              sProt = card.querySelector(".pr"), sBebi = card.querySelector(".b"), dChip = card.querySelector(".a");
        
        const gSopa = card.querySelector(".group-e"), gProt = card.querySelector(".group-pr"), 
              gChip = card.querySelector(".group-a");

        sBebi.innerHTML = get(5).map(x => `<option>${x}</option>`).join("");
        
        if (modo === "especial") {
            sPlato.innerHTML = get(colEspecial).map(x => `<option>${x}</option>`).join("");
            gSopa.style.display = gProt.style.display = gChip.style.display = "none";
        } else {
            gSopa.style.display = gProt.style.display = gChip.style.display = "block";
            sSopa.innerHTML = get(4).map(x => `<option>${x}</option>`).join("");
            sPlato.innerHTML = get(1).map(x => `<option>${x}</option>`).join("");
            sProt.innerHTML = get(2).map(x => `<option>${x}</option>`).join("");
            dChip.innerHTML = "";
            get(3).forEach(i => {
                let d = document.createElement("div"); d.className = "chip"; d.textContent = i;
                d.onclick = () => d.classList.toggle("active"); dChip.appendChild(d);
            });
        }
    });
}

document.getElementById("dia").onchange = render;
document.getElementById("tipoMenu").onchange = render;

function mesa(){
    if(isDomicilio) return "DOMICILIO";
    let m=document.querySelector("#mesas .active");
    return m ? m.textContent : "N/A";
}

function wa(){
    const mesaSel = mesa();
    let msg = `🍴 *TAMARINDO - PEDIDO*\n🪑 *Mesa:* ${mesaSel}\n`;
    if(isDomicilio){
        msg += `👤 *Cliente:* ${document.getElementById("dom-nombre").value}\n📞 *Tel:* ${document.getElementById("dom-tel").value}\n📍 *Dir:* ${document.getElementById("dom-dir").value}\n`;
        if(document.getElementById("dom-obs-general").value) msg += `📝 *Obs Gen:* ${document.getElementById("dom-obs-general").value}\n`;
    }
    msg += `--------------------------\n\n`;
    document.querySelectorAll(".comensal-card").forEach((c, i) => {
        let d = { 
            p: c.querySelector(".p").value, 
            b: c.querySelector(".b").value, 
            obs: c.querySelector(".obs").value,
            e: c.querySelector(".group-e").style.display !== "none" ? c.querySelector(".e").value : "", 
            pr: c.querySelector(".group-pr").style.display !== "none" ? c.querySelector(".pr").value : "", 
            ch: [...c.querySelectorAll(".chip.active")].map(x => x.textContent).join(", ") 
        };
        msg += `👤 *Comensal ${i + 1}*\n🍛 *Plato:* ${d.p}\n`;
        if(d.pr) msg += `🥩 *Prot:* ${d.pr}\n`;
        if(d.e) msg += `🍲 *Sopa:* ${d.e}\n`;
        if(d.ch) msg += `🍟 *Acomp:* ${d.ch}\n`;
        msg += `🥤 *Bebida:* ${d.b}\n`;
        if(d.obs) msg += `📝 *Nota:* ${d.obs}\n`;
        msg += `\n`;
    });
    window.open(`https://wa.me/${NUMERO_WHATSAPP}?text=${encodeURIComponent(msg)}`);
}

function imprimir(){
    const mesaSel = mesa();
    const fecha = new Date().toLocaleString();
    
    // Datos Domicilio si aplica
    let domiHtml = "";
    if(isDomicilio) {
        domiHtml = `
        <div class="section-domi">
            <b>>> DATOS DE ENVÍO <<</b><br>
            CLIENTE: ${document.getElementById("dom-nombre").value.toUpperCase()}<br>
            TEL: ${document.getElementById("dom-tel").value}<br>
            DIR: ${document.getElementById("dom-dir").value.toUpperCase()}<br>
            OBS: ${document.getElementById("dom-obs-general").value.toUpperCase() || "NINGUNA"}
        </div>
        <div class="line"></div>`;
    }

    let itemsCaja = "", itemsCocina = "";
    document.querySelectorAll(".comensal-card").forEach((c, i) => {
        let d = { 
            p: c.querySelector(".p").value, 
            b: c.querySelector(".b").value, 
            obs: c.querySelector(".obs").value,
            e: c.querySelector(".e")?.value, 
            pr: c.querySelector(".pr")?.value, 
            ch: [...c.querySelectorAll(".chip.active")].map(x => x.textContent).join(", ") 
        };
        
        // Bloque Caja
        itemsCaja += `[${i+1}] ${d.p.substring(0,25)}<br> &nbsp;&nbsp;+ ${d.b.substring(0,25)}<br>`;
        
        // Bloque Cocina
        itemsCocina += `<b>${i+1}. ${d.p.toUpperCase()}</b><br>`;
        if(d.e && c.querySelector(".group-e").style.display !== "none") itemsCocina += `- SOPA: ${d.e.toUpperCase()}<br>- PROT: ${d.pr.toUpperCase()}<br>`;
        if(d.ch && c.querySelector(".group-a").style.display !== "none") itemsCocina += `- EXT: ${d.ch.toUpperCase()}<br>`;
        itemsCocina += `- BEB: ${d.b.toUpperCase()}<br>`;
        if(d.obs) itemsCocina += `<div class="obs-ticket">** NOTA: ${d.obs.toUpperCase()} **</div>`;
        itemsCocina += `<div class="line-thin"></div>`;
    });

    const ticketStyles = `
        <style>
            body { font-family: 'Courier New', Courier, monospace; width: 48mm; font-size: 11px; color: black; margin: 0; padding: 2mm; line-height: 1.2; }
            .center { text-align: center; }
            .line { border-top: 1px dashed black; margin: 5px 0; }
            .line-thin { border-top: 0.5px solid #ccc; margin: 4px 0; }
            .header-title { font-size: 16px; font-weight: bold; display: block; }
            .section-title { font-weight: bold; background: #eee; text-align: center; margin: 10px 0 5px 0; padding: 2px; }
            .obs-ticket { font-weight: bold; border: 1px solid black; padding: 2px; margin: 2px 0; }
            .section-domi { font-size: 10px; border-left: 3px solid black; padding-left: 4px; }
            pre { white-space: pre-wrap; font-family: inherit; }
        </style>`;

    const doc = `
    <html>
    <head>${ticketStyles}</head>
    <body>
        <div class="center">
            <span class="header-title">TAMARINDO</span>
            Cocinando con Amor<br>
            ${fecha}
        </div>
        <div class="line"></div>
        <div class="center" style="font-size:14px"><b>${isDomicilio ? "🛵 DOMICILIO" : "🪑 MESA: " + mesaSel}</b></div>
        <div class="line"></div>
        
        ${domiHtml}

        <div class="section-title">COPIA CAJA</div>
        ${itemsCaja}
        
        <div style="page-break-after: always; margin: 20px 0; border-top: 2px dotted black;"></div>

        <div class="center"><b>>> COCINA <<</b></div>
        <div class="center">${isDomicilio ? "DOMICILIO" : "MESA: " + mesaSel}</div>
        <div class="line"></div>
        ${itemsCocina}
        
        <div class="center" style="margin-top:10px">--- FIN DE PEDIDO ---</div>
    </body>
    </html>`;

    const frame = document.getElementById('printFrame');
    const frameDoc = frame.contentWindow.document;
    frameDoc.open(); 
    frameDoc.write(doc); 
    frameDoc.close();
    
    setTimeout(() => { 
        frame.contentWindow.print(); 
        guardarPedido(); 
    }, 500);
}

function nuevoPedido() {
    if(!confirm("¿Deseas limpiar TODA la información del pedido?")) return;
    total = 1; 
    document.getElementById("count").textContent = total;
    isDomicilio = false; 
    document.getElementById("btn-domicilio").classList.remove("active");
    document.getElementById("section-domicilio").style.display = "none";
    document.getElementById("section-mesas").style.display = "block";
    document.querySelectorAll("input").forEach(i => { if(i.type === "text" || i.type === "number") i.value = ""; });
    document.querySelectorAll("#mesas .btn").forEach(x => x.classList.remove("active"));
    render();
}

function guardarPedido(){
    let p = JSON.parse(localStorage.getItem("pedidos") || "[]");
    p.unshift({ mesa: mesa(), fecha: new Date().toLocaleTimeString(), platos: [...document.querySelectorAll(".p")].map(x=>x.value) });
    localStorage.setItem("pedidos", JSON.stringify(p.slice(0,10)));
    cargarHistorial();
}

function cargarHistorial(){
    let p = JSON.parse(localStorage.getItem("pedidos") || "[]");
    document.getElementById("historial").innerHTML = p.map((x,i)=>`
        <div class="hist-item"><b>${x.mesa}</b> (${x.fecha})<br><small>${x.platos.join(", ")}</small><br>
        <button class="del-btn" onclick="del(${i})">Borrar</button></div>`).join("");
}

function del(i){
    let p = JSON.parse(localStorage.getItem("pedidos"));
    p.splice(i,1); localStorage.setItem("pedidos", JSON.stringify(p)); cargarHistorial();
}
</script>
</body>
</html>
