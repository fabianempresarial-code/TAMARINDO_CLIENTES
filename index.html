<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #22c55e;
    --accent2: #06b6d4;
    --text: #f8fafc;
    --soft: #334155;
}

/* Base de App a pantalla completa */
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
    background: #020617;
    color: var(--text);
    overflow-x: hidden;
}

#app-content {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: linear-gradient(180deg, #0f172a, #020617);
}

header {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    padding: 15px;
    text-align: center;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    flex-shrink: 0;
}

/* Contenedor flexible que se adapta a la orientación */
.container {
    padding: 15px;
    display: flex;
    flex-wrap: wrap; /* Esto permite que se acomoden de lado en horizontal */
    gap: 15px;
    justify-content: center;
    width: 100%;
    box-sizing: border-box;
}

/* Tarjetas flexibles */
.card {
    background: var(--card);
    padding: 15px;
    border-radius: 16px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
    box-sizing: border-box;
    /* En vertical ocupan todo el ancho */
    flex: 1 1 100%; 
}

/* En pantallas horizontales o anchas (Tablets/PC), las tarjetas se dividen el espacio */
@media (min-width: 768px) {
    .card {
        flex: 1 1 calc(45% - 15px); /* Se acomodan de a dos */
    }
    .main-actions {
        flex: 1 1 100%; /* Botones de acción siempre abajo a lo ancho */
    }
}

/* Rejilla de mesas adaptable */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
    gap: 10px;
}

/* Ajustes de inputs para que no se deformen */
select, .input-domi, .input-obs {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: #020617;
    color: white;
    border: 1px solid var(--soft);
    font-size: 16px;
}

.actions { display: flex; justify-content: center; align-items: center; gap: 30px; }
#count { font-size: 2.5rem; font-weight: bold; }

.main-actions {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: 10px;
}

#comensales {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    width: 100%;
}

/* Las tarjetas de platos individuales se adaptan al espacio lateral */
.comensal-card {
    flex: 1 1 minmax(300px, 1fr);
}
</style>
